name: build
run-name: ${{ github.actor }} is testing barkeep
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test-for-cpp-meson:
    name: "Build and test for C++ with meson"
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "Install tooling"
        run: |
          sudo apt-get install lcov ninja-build
          g++-13 --version
          gcov-13 --version
          lcov --version
          pip install meson pytest
      - name: "Build and test"
        run: |
          CXX=g++-13 meson setup build --buildtype=debug --warnlevel=3 -Db_coverage=true
          meson compile -C build tests
          ./build/tests/test.out
          ./build/tests/test-fmtlib.out
          ./build/tests/test-stdfmt.out
      - name: "Generate coverage"
        run: |
          lcov -c -d build -o cov.info --gcov-tool gcov-13 --ignore-errors mismatch
          lcov --gcov-tool gcov-13 \
               --remove cov.info \
                                 '/usr/include*' \
                                 '*/subprojects/*' \
                                 '*/tests/*' \
               -o barkeep.info
          rm cov.info
      - name: Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: barkeep.info
  build-and-test-for-python:
    name: "Build and test for Python"
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install meson pytest
          sudo apt install ninja-build
          meson setup build --buildtype=release --warnlevel=3
          meson compile -C build python
          PYTHONPATH=build/python pytest python/tests/test.py
  conan-recipe-test:
    name: "Test conan recipe"
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install tooling"
        run: |
          pip install "conan>=2.0"
          conan profile detect
      - name: "Build and test conan package"
        run: |
          conan create . --build=missing -s compiler.cppstd=20
  clang-format-check:
    name: "Check formatting"
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install clang-format"
        run: pip install -r requirements-dev.txt
      - name: "Check formatting"
        run: |
          clang-format --version
          clang-format --dry-run --Werror \
            barkeep/barkeep.h \
            docs/after.cpp docs/before.cpp \
            python/barkeep.cpp \
            test_package/test_package.cpp \
            tests/demo-fmtlib.cpp tests/demo-stdfmt.cpp tests/demo.cpp \
            tests/test-fmtlib.cpp tests/test-stdfmt.cpp tests/test.cpp \
            tests/testutil.h
